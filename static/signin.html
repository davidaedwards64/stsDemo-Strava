<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — My Training Agent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #ffffff;
      border: 1px solid #ddd8d4;
      border-radius: 12px;
      padding: 40px 48px;
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    .logo {
      width: 56px;
      height: 56px;
      background: #FC4C02;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: #fff;
      font-weight: 700;
    }

    .heading {
      text-align: center;
    }

    .heading h1 {
      font-size: 20px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 6px;
    }

    .heading p {
      font-size: 14px;
      color: #7a7068;
      line-height: 1.5;
    }

    .signin-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      background: #FC4C02;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 20px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
    }

    .signin-btn:hover { background: #e04402; }

    .signin-btn .okta-icon {
      width: 20px;
      height: 20px;
      background: #fff;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: #FC4C02;
      flex-shrink: 0;
    }

    .error-banner {
      width: 100%;
      background: #ffeeed;
      border: 1px solid #d1242f;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 13px;
      color: #b91c1c;
      line-height: 1.4;
    }

    .footer {
      font-size: 12px;
      color: #9a9088;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🏃</div>

    <div class="heading">
      <h1>My Training Agent</h1>
      <p>Sign in with your Okta account to access your Strava training data through AI.</p>
    </div>

    <div class="error-banner" id="error-banner" style="display:none"></div>

    <a class="signin-btn" href="/auth/start">
      <span class="okta-icon">O</span>
      Sign in with Okta
    </a>

  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const error = params.get('error');
    if (error) {
      const banner = document.getElementById('error-banner');
      banner.textContent = decodeURIComponent(error);
      banner.style.display = 'block';
    }
  </script>
</body>
</html>
